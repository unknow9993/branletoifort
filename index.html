<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branlette Dashboard - Édition Légendaire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container">
        <div class="auth-card" id="login-card">
            <h2>CONNEXION</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Pseudo</label>
                    <input type="text" id="login-username" required placeholder="Votre pseudo...">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Se connecter</button>
            </form>
            <div class="auth-toggle">
                Pas encore de compte ? <span onclick="toggleAuth(false)">S'inscrire</span>
            </div>
        </div>

        <div class="auth-card" id="register-card" style="display: none;">
            <h2>INSCRIPTION</h2>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Pseudo</label>
                    <input type="text" id="reg-username" required placeholder="Choisissez un pseudo...">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="reg-password" required placeholder="Créer un mot de passe...">
                </div>
                <button type="submit" class="auth-btn">Créer le compte</button>
            </form>
            <div class="auth-toggle">
                Déjà inscrit ? <span onclick="toggleAuth(true)">Se connecter</span>
            </div>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <div class="sidebar">
            <div class="brand">👑 DASHBOARD</div>
            <div class="user-summary">
                <div class="user-block">
                    <div class="name" id="sb-username">Utilisateur</div>
                    <div class="rank" id="sb-rank">Novice</div>
                    <div class="equipped-badges-sub" id="sb-badges"></div>
                </div>
            </div>
            <div class="menu-items">
                <button class="menu-btn active" onclick="switchPage('profil', this)">Profil</button>
                <button class="menu-btn" id="admin-nav-btn" onclick="switchPage('admin', this)">🛡️ Panel Admin</button>
            </div>
        </div>

        <div class="content-container">
            <div class="page-header">
                <div class="page-title" id="current-page-title">PROFIL</div>
                <button class="btn-logout" onclick="logout()">Déconnexion</button>
            </div>

            <div id="page-profil" class="page active">
                <h2>Bienvenue sur votre espace.</h2>
                <p style="margin-top: 10px; color: var(--text-muted);">Vos statistiques de session sont prêtes.</p>
            </div>

            <div id="page-admin" class="page">
                <h2>Panel d'Administration Global</h2>
                <p style="color: var(--text-muted); margin-bottom: 2rem;">Gestion des privilèges et données locales.</p>
                <div class="comm-section" style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 1px solid rgba(255,159,67,0.2); height: 40px; color: var(--primary);">
                                <th>Pseudo</th>
                                <th>Points</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-tbody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
